# Audit §4.1 — automated dependency updates so framework pins never rot
# 2 years again (Next.js sat on 14.1.0 from Jan 2024 to Jun 2026).
#
# Strategy: weekly, minor+patch grouped into one PR per workspace,
# majors arrive as separate PRs so they get individual review.
version: 2
updates:
  # Single pnpm workspace — one lockfile at the root covers apps/*,
  # packages/*, apps/nexus/apps/* and apps/nexus/packages/* (audit §2.1).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  # GitHub Actions pins
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
