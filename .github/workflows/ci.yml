name: CI

on:
  push:
    branches: [main]
  pull_request:

# Stop earlier runs of the same branch — no point burning minutes
# on stale code.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Turbo Remote Cache - inert until TURBO_TOKEN/TURBO_TEAM are set,
  # then build/typecheck/test become cache hits across jobs and runs.
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ─── Shared packages — types, logger, build ─────────────────────────
  # Note: @posteragent/ui will be added here once packages/ui lands on main
  # (chore/phase-2-packages-ui). That PR includes the CI update for the new package.
  check:
    name: shared-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Validate .env schema alignment
      - run: pnpm check-env --env-only --check-example
        continue-on-error: true
      # Build + typecheck shared packages (order enforced by Turbo DAG)
      - run: |
          pnpm turbo build \
            --filter=@posteragent/types \
            --filter=@posteragent/logger
      - run: |
          pnpm turbo typecheck \
            --filter=@posteragent/types \
            --filter=@posteragent/logger

  # ─── Lint (all active @posteragent/* packages) ──────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: |
          pnpm turbo lint \
            --filter=@posteragent/orchestrator \
            --filter=@posteragent/agent-publisher \
            --filter=@posteragent/agent-research \
            --filter=@posteragent/agent-budget \
            --filter=@posteragent/agent-analytics \
            --filter=@posteragent/agent-revenue \
            --filter=@posteragent/memory \
            --filter=@posteragent/identity

  # ─── Brain / V1 agents ───────────────────────────────────────────────
  brain:
    name: brain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Build @posteragent/types (exports from dist/) before typechecking dependants
      - run: pnpm turbo build --filter=@posteragent/types --filter=@posteragent/logger
      - run: pnpm --filter @posteragent/memory --filter @posteragent/identity --filter @posteragent/orchestrator --filter @posteragent/proactivity --filter @posteragent/agent-research typecheck
      - run: pnpm --filter @posteragent/memory --filter @posteragent/identity --filter @posteragent/orchestrator --filter @posteragent/proactivity --filter @posteragent/agent-research test

  # ─── V2 agent packages (the ones actually wired into nexus-api) ──────
  v2-agents:
    name: v2-agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Build @posteragent/types (exports from dist/) before typechecking dependants
      - run: pnpm turbo build --filter=@posteragent/types --filter=@posteragent/logger
      - run: |
          pnpm \
            --filter @posteragent/agent-analytics \
            --filter @posteragent/agent-autonome \
            --filter @posteragent/agent-revenue \
            --filter @posteragent/agent-budget \
            --filter @posteragent/agent-mindsdb \
            --filter @posteragent/agent-publisher \
            typecheck
      - run: |
          pnpm \
            --filter @posteragent/agent-analytics \
            --filter @posteragent/agent-autonome \
            --filter @posteragent/agent-revenue \
            --filter @posteragent/agent-budget \
            --filter @posteragent/agent-mindsdb \
            --filter @posteragent/agent-publisher \
            test

  # ─── Nexus monorepo (Workers + API) ──────────────────────────────────
  nexus:
    name: nexus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run typecheck --filter="@nexus/*"
      - run: pnpm turbo run test --filter="@nexus/*"
      - run: pnpm turbo run build --filter=@nexus/nexus-api --filter=@nexus/nexus-ai
      - name: D1 migrations dry-run
        working-directory: apps/nexus
        run: |
          echo 'wrangler provided via pnpm dlx'
          cd apps/nexus-api
          pnpm dlx wrangler@3 d1 migrations list nexus-db --local
      - name: D1 schema-drift check
        working-directory: apps/nexus
        run: |
          npm install --no-save better-sqlite3@^12 || true
          node scripts/check-schema-drift.mjs

  # ─── Migration discipline (audit #43) ──────────────────────────────────
  migration-discipline:
    name: migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate migration filenames
        working-directory: apps/nexus/migrations
        run: |
          nums=$(ls [0-9]*.sql 2>/dev/null | sed 's/\.sql$//' | sed 's/^0*\([1-9][0-9]*[a-z]*\).*/\1/' | sort -V)
          if [ -z "$nums" ]; then echo "No SQL migrations found"; exit 0; fi
          prev=""
          dupes=0
          for n in $nums; do
            if [ "$n" = "$prev" ]; then
              echo "✗ Migration prefix '\$n' is duplicated"
              dupes=$((dupes + 1))
            fi
            prev=$n
          done
          if [ "$dupes" -gt 0 ]; then
            echo "✗ Found $dupes duplicate migration prefix(es). Use unique, incrementing prefixes."
            exit 1
          fi
          echo "✓ All migration prefixes are unique and monotonically ordered."
