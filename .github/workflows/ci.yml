name: CI

on:
  push:
    branches: [main]
  pull_request:

# Stop earlier runs of the same branch — no point burning minutes
# on stale code.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Core repo packages — typecheck + build ──────────────────────────
  check:
    name: core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck --filter=@repo/config --filter=@repo/core --filter=@repo/agents --filter=@repo/tools --filter=@repo/workflows --filter=@repo/publishers --filter=@repo/generators --filter=@repo/cms --filter=@repo/factory --filter=@repo/runner
      - run: pnpm build     --filter=@repo/config --filter=@repo/core --filter=@repo/agents --filter=@repo/tools --filter=@repo/workflows --filter=@repo/publishers --filter=@repo/generators --filter=@repo/cms --filter=@repo/factory --filter=@repo/runner

  # ─── Dashboard ───────────────────────────────────────────────────────
  dashboard:
    name: dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @posteragent/dashboard typecheck
      - run: pnpm --filter @posteragent/dashboard test
      - run: pnpm --filter @posteragent/dashboard build

  # ─── Brain / V1 agents ───────────────────────────────────────────────
  brain:
    name: brain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @posteragent/memory --filter @posteragent/identity --filter @posteragent/orchestrator --filter @posteragent/proactivity --filter @posteragent/agent-research typecheck
      - run: pnpm --filter @posteragent/memory --filter @posteragent/identity --filter @posteragent/orchestrator --filter @posteragent/proactivity --filter @posteragent/agent-research test

  # ─── V2 agent packages (Phases 4-9) ──────────────────────────────────
  v2-agents:
    name: v2-agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: |
          pnpm \
            --filter @posteragent/agent-brand-monitor \
            --filter @posteragent/agent-trend-finder \
            --filter @posteragent/agent-finance \
            --filter @posteragent/context-engine \
            --filter @posteragent/agent-product-gen \
            --filter @posteragent/agent-docs-writer \
            --filter @posteragent/agent-content-planner \
            --filter @posteragent/agent-writer \
            --filter @posteragent/agent-video-factory \
            --filter @posteragent/agent-podcast \
            --filter @posteragent/agent-image \
            --filter @posteragent/agent-publisher \
            --filter @posteragent/agent-analytics \
            --filter @posteragent/agent-leads \
            --filter @posteragent/agent-email \
            --filter @posteragent/agent-affiliate \
            --filter @posteragent/agent-autonome \
            --filter @posteragent/agent-revenue \
            --filter @posteragent/agent-budget \
            typecheck
      - run: |
          pnpm \
            --filter @posteragent/agent-brand-monitor \
            --filter @posteragent/agent-trend-finder \
            --filter @posteragent/agent-finance \
            --filter @posteragent/context-engine \
            --filter @posteragent/agent-product-gen \
            --filter @posteragent/agent-docs-writer \
            --filter @posteragent/agent-content-planner \
            --filter @posteragent/agent-writer \
            --filter @posteragent/agent-video-factory \
            --filter @posteragent/agent-podcast \
            --filter @posteragent/agent-image \
            --filter @posteragent/agent-publisher \
            --filter @posteragent/agent-analytics \
            --filter @posteragent/agent-leads \
            --filter @posteragent/agent-email \
            --filter @posteragent/agent-affiliate \
            --filter @posteragent/agent-autonome \
            --filter @posteragent/agent-revenue \
            --filter @posteragent/agent-budget \
            test

  # ─── MCP integrations + quality (Phases 10-11) ───────────────────────
  mcp-quality:
    name: mcp-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: |
          pnpm \
            --filter @posteragent/agent-memory-graph \
            --filter @posteragent/agent-firecrawl \
            --filter @posteragent/agent-voice \
            --filter @posteragent/agent-mindsdb \
            --filter @posteragent/evals \
            --filter @posteragent/quota \
            typecheck
      - run: |
          pnpm \
            --filter @posteragent/agent-memory-graph \
            --filter @posteragent/agent-firecrawl \
            --filter @posteragent/agent-voice \
            --filter @posteragent/agent-mindsdb \
            --filter @posteragent/evals \
            --filter @posteragent/quota \
            test

  # ─── Nexus monorepo (Workers + API) ──────────────────────────────────
  nexus:
    name: nexus
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/nexus
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/nexus/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # D1 migrations syntax check — runs against an ephemeral local DB
      # so we catch broken SQL before deploy. Skips silently when wrangler
      # isn't available in the runtime.
      - name: D1 migrations dry-run
        run: |
          npm install -g wrangler@3
          cd apps/nexus-api
          wrangler d1 migrations list nexus-db --local || true

  # ─── Evals — run the eval suite as a soft-pass gate ──────────────────
  evals:
    name: evals
    runs-on: ubuntu-latest
    needs: [mcp-quality]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Run evals (warn-only)
        continue-on-error: true
        run: |
          if [ -f evals.config.mjs ]; then
            node packages/evals/bin/run.mjs --suites evals.config.mjs
          else
            echo "No evals.config.mjs at repo root — skipping."
          fi
