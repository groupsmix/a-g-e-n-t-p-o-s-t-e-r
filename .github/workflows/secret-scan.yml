name: secret-scan

# T18 — fail the build if a high-confidence live secret lands in a tracked
# file. Cheap, dependency-free guard (see scripts/check-secrets.mjs). This is
# the durable half of "make the repo private (or scrub secrets)"; flipping
# visibility is a one-time owner action in GitHub settings.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/check-secrets.mjs
