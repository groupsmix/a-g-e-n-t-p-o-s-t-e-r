name: Deploy Workers

# Manual-only until CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets are set
# on this repo. Cloudflare Pages auto-deploys via git integration — this workflow
# only handles the Workers (nexus-ai, nexus-api) and D1 migrations.
on:
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/nexus
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/nexus/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Install wrangler
        run: npm install -g wrangler@3

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      # Deploy nexus-ai worker
      - name: Deploy nexus-ai
        run: wrangler deploy
        working-directory: apps/nexus/apps/nexus-ai

      # Deploy nexus-api worker
      - name: Deploy nexus-api
        run: wrangler deploy
        working-directory: apps/nexus/apps/nexus-api

      # Run D1 migrations
      - name: Run D1 migrations
        run: wrangler d1 migrations apply nexus-db --remote
        working-directory: apps/nexus/apps/nexus-api
