name: Deploy Workers

# Manual-only until CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets
# are set on this repo. The dashboard auto-deploys via Cloudflare Pages'
# git integration — this workflow only handles the Workers (nexus-ai,
# nexus-api) and D1 migrations.
#
# Deploy is gated on CI: the workflow_run trigger only fires after the
# CI workflow has succeeded on the same SHA.

on:
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip D1 migrations (use when only worker code changed)'
        required: false
        default: 'false'
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    # Refuses to run if CI failed (workflow_run path), or if no CF
    # credentials are present.
    name: guard
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Cloudflare credentials missing — skipping deploy."
            echo "proceed=false" >> $GITHUB_OUTPUT
          else
            echo "proceed=true" >> $GITHUB_OUTPUT
          fi

  migrations:
    name: d1-migrations
    needs: guard
    if: |
      needs.guard.outputs.proceed == 'true' &&
      github.event.inputs.skip_migrations != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/nexus/apps/nexus-api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # No workspace install needed: wrangler only reads wrangler.toml and
      # the migrations dir (audit §2.1 — nested lockfile removed).
      - name: Install wrangler
        run: npm install -g wrangler@3
      - name: Apply D1 migrations
        run: wrangler d1 migrations apply nexus-db --remote

  workers:
    name: workers
    needs: [guard, migrations]
    # Allow workers to deploy even if migrations was skipped via input.
    if: |
      always() &&
      needs.guard.outputs.proceed == 'true' &&
      (needs.migrations.result == 'success' || needs.migrations.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Real validation via turbo from the root workspace (audit §2.1).
      # The old `pnpm lint/typecheck/test/build` here ran the nexus
      # package's no-op "Run from root" scripts — deploys were unvalidated.
      - run: pnpm turbo run typecheck --filter="@nexus/*"
      - run: pnpm turbo run test --filter="@nexus/*"
      - run: pnpm turbo run build --filter=@nexus/nexus-api --filter=@nexus/nexus-ai
      - name: Install wrangler
        run: npm install -g wrangler@3
      - name: Deploy nexus-ai
        run: wrangler deploy
        working-directory: apps/nexus/apps/nexus-ai
      - name: Deploy nexus-api
        run: wrangler deploy
        working-directory: apps/nexus/apps/nexus-api
      # Post-deploy smoke test (audit §3.1): until now nothing verified the
      # live worker after a deploy. /api/health is registered before the
      # access gate (see nexus-api src/index.ts), so it needs no token.
      - name: Smoke test live API
        env:
          NEXUS_API_URL: ${{ vars.NEXUS_API_URL || 'https://nexus-api.professional-inbox-simo.workers.dev' }}
        run: |
          set -euo pipefail
          ok=0
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 -o health.json "$NEXUS_API_URL/api/health"; then ok=1; break; fi
            echo "attempt $i failed — retrying in 5s"; sleep 5
          done
          if [ "$ok" != "1" ]; then
            echo "::error::nexus-api unreachable after deploy ($NEXUS_API_URL/api/health)"
            exit 1
          fi
          cat health.json
          node -e "const h=require('./health.json'); if (h.status !== 'ok') { console.error('unhealthy payload:', h); process.exit(1) }"

  # Dashboard auto-deploys from Cloudflare Pages on push to main. We
  # still smoke-test the build here so a broken dashboard can't pass
  # silently after a merge.
  dashboard-smoke:
    name: dashboard-smoke
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @posteragent/dashboard build
