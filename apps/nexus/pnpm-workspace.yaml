packages:
  - 'apps/*'
  - 'packages/*'
  # Outer-monorepo @posteragent/* packages consumed by nexus-api.
  # Mounted here as relative paths so pnpm can resolve workspace:* deps
  # without merging the two workspaces.
  - '../../packages/logger'
  - '../../packages/types'
  - '../../packages/identity'
  - '../../packages/memory'
  - '../../packages/orchestrator'
  - '../../packages/proactivity'
  - '../../packages/agent-research'
  - '../../packages/agent-analytics'
  - '../../packages/agent-autonome'
  - '../../packages/agent-revenue'
  - '../../packages/agent-budget'
  - '../../packages/agent-mindsdb'
  - '../../packages/agent-publisher'
